<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="robots" content="noindex, nofollow">
<title>paalhn — messages</title>
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@500&family=Inter:wght@400;500&display=swap" rel="stylesheet">
<style>
  :root{
    --paper:#FFFFFF; --ink:#1A1A1A;
    --graphite:#8C8C87; --line:#E9E8E4;
  }
  *{ box-sizing:border-box; }
  body{
    margin:0; min-height:100vh;
    background:var(--paper); color:var(--ink);
    font-family:'Inter', sans-serif;
    display:flex; align-items:flex-start; justify-content:center;
  }
  .wrap{ width:100%; max-width:820px; padding:56px 24px; }
  h1{
    font-family:'Space Grotesk', sans-serif;
    font-weight:500;
    font-size:22px; margin:0 0 4px;
  }
  .sub{ color:var(--graphite); font-size:13.5px; margin:0 0 36px; }
  h1:empty{ display:none; }
  .sub:empty{ display:none; margin:0; }

  .gate{
    max-width:300px;
    display:grid; gap:14px;
  }
  .gate input{
    font-family:'Inter', sans-serif;
    font-size:14px; padding:8px 0;
    background:transparent; border:none; border-bottom:1px solid var(--line);
    outline:none;
  }
  .gate input:focus{ border-color:var(--ink); }
  .gate button{
    font-family:'Inter', sans-serif;
    font-size:13px; letter-spacing:0.02em;
    background:var(--ink); color:var(--paper); border:none;
    border-radius:2px; padding:11px 18px; cursor:pointer;
  }
  .gate button:hover{ opacity:0.8; }
  .err{ color:#B23A2E; font-size:12.5px; min-height:16px; }

  .toolbar{
    display:flex; justify-content:space-between; align-items:center;
    margin-bottom:20px; gap:12px; flex-wrap:wrap;
  }
  .count{ font-size:12.5px; color:var(--graphite); }
  .actions{ display:flex; gap:18px; }
  .btn{
    font-family:'Inter', sans-serif; font-size:12.5px;
    letter-spacing:0.02em;
    background:transparent; color:var(--graphite);
    border:none; border-bottom:1px solid var(--line);
    padding:0 0 2px; cursor:pointer;
  }
  .btn:hover{ color:var(--ink); border-color:var(--ink); }
  .btn.primary{ color:var(--ink); font-weight:500; }
  .btn.primary:hover{ color:var(--ink); border-color:var(--ink); }

  table{ width:100%; border-collapse:collapse; font-size:13.5px; }
  th, td{ text-align:left; padding:10px 10px; border-bottom:1px solid var(--line); vertical-align:top; }
  th{
    font-size:11px;
    letter-spacing:0.04em; text-transform:uppercase; color:var(--graphite);
    font-weight:500;
  }
  td.msg{ max-width:340px; white-space:pre-wrap; }
  td.time{ font-size:12px; color:var(--graphite); white-space:nowrap; }

  #app{ display:none; }
</style>
</head>
<body>
<div class="wrap">
  <h1></h1>
  <p class="sub"></p>

  <div class="gate" id="gate">
    <input type="password" id="pw" placeholder="Password" autocomplete="off">
    <button id="unlock">Unlock</button>
    <div class="err" id="err"></div>
  </div>

  <div id="app">
    <div class="toolbar">
      <span class="count" id="count"></span>
      <div class="actions">
        <button class="btn" id="refreshBtn">Refresh</button>
        <button class="btn primary" id="csvBtn">Download CSV</button>
      </div>
    </div>
    <table>
      <thead>
        <tr><th>Time</th><th>Name</th><th>Email</th><th>Message</th></tr>
      </thead>
      <tbody id="rows"></tbody>
    </table>
  </div>
</div>

<script>
/* Paste the same Apps Script Web App URL used in index.html */
const APPS_SCRIPT_URL = "https://script.google.com/macros/s/AKfycbw1AMPajUI8Wp71f-c146msw8mgr5YUo54TPfCPa_ehSgrMuBG0QCmL4PwQTw0MX7s-/exec";

const gate = document.getElementById('gate');
const app = document.getElementById('app');
const errEl = document.getElementById('err');
const pwInput = document.getElementById('pw');
let currentData = [];
let currentKey = '';

async function fetchMessages(key){
  errEl.textContent = '';
  if (APPS_SCRIPT_URL.includes('PASTE_YOUR')) {
    errEl.textContent = 'Not connected yet — see setup notes.';
    return;
  }
  try {
    const res = await fetch(`${APPS_SCRIPT_URL}?key=${encodeURIComponent(key)}`);
    const data = await res.json();
    if (data.error) {
      errEl.textContent = 'Incorrect password.';
      return;
    }
    currentData = data.rows || [];
    currentKey = key;
    render();
    gate.style.display = 'none';
    app.style.display = 'block';
  } catch (err) {
    errEl.textContent = 'Could not reach the server. Try again.';
  }
}

function render(){
  const tbody = document.getElementById('rows');
  tbody.innerHTML = '';
  currentData.slice().reverse().forEach(row => {
    const tr = document.createElement('tr');
    tr.innerHTML = `
      <td class="time">${escapeHtml(row.timestamp || '')}</td>
      <td>${escapeHtml(row.name || '')}</td>
      <td>${escapeHtml(row.email || '')}</td>
      <td class="msg">${escapeHtml(row.message || '')}</td>
    `;
    tbody.appendChild(tr);
  });
  document.getElementById('count').textContent = `${currentData.length} message${currentData.length === 1 ? '' : 's'}`;
}

function escapeHtml(str){
  const div = document.createElement('div');
  div.textContent = str;
  return div.innerHTML;
}

function toCsv(rows){
  const header = ['timestamp','name','email','message'];
  const esc = (v) => `"${String(v ?? '').replace(/"/g, '""')}"`;
  const lines = [header.join(',')];
  rows.forEach(r => {
    lines.push(header.map(h => esc(r[h])).join(','));
  });
  return lines.join('\n');
}

document.getElementById('unlock').addEventListener('click', () => fetchMessages(pwInput.value));
pwInput.addEventListener('keydown', (e) => { if (e.key === 'Enter') fetchMessages(pwInput.value); });

document.getElementById('refreshBtn').addEventListener('click', () => fetchMessages(currentKey));

document.getElementById('csvBtn').addEventListener('click', () => {
  const csv = toCsv(currentData);
  const blob = new Blob([csv], { type: 'text/csv;charset=utf-8;' });
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href = url;
  a.download = `paalhn-messages-${new Date().toISOString().slice(0,10)}.csv`;
  a.click();
  URL.revokeObjectURL(url);
});
</script>
</body>
</html>
